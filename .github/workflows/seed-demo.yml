name: Seed Demo Data

# Re-seed demo@example.com on production without a full backend redeploy.

on:
  workflow_dispatch:

jobs:
  seed-demo:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsKaiznBonsaiRole
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve EB instance
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:elasticbeanstalk:environment-name,Values=KaiznBonsai-Prod" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running EB instance found for KaiznBonsai-Prod"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Using instance $INSTANCE_ID"

      - name: Run generate_seed_data on EB instance
        env:
          DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
        run: |
          REMOTE_SCRIPT=$(jq -rn --arg pwd "$DEMO_USER_PASSWORD" '
            "export DEMO_USER_PASSWORD=" + ($pwd | @sh) + "\n" +
            "cd /var/app/current\n" +
            "docker compose exec -T -e DEMO_USER_PASSWORD=$DEMO_USER_PASSWORD backend python manage.py generate_seed_data"
          ')

          SSM_INPUT=$(jq -n \
            --arg instance "${{ steps.instance.outputs.instance_id }}" \
            --arg script "$REMOTE_SCRIPT" \
            '{
              DocumentName: "AWS-RunShellScript",
              Comment: "KaiznBonsai demo seed (GitHub Actions)",
              InstanceIds: [$instance],
              Parameters: {commands: [$script]}
            }')

          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json "$SSM_INPUT" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command id: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.instance.outputs.instance_id }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: $STATUS"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.instance.outputs.instance_id }}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.instance.outputs.instance_id }}"
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "Timed out waiting for SSM command"
          exit 1
