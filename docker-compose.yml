
services:
  db:
    image: postgres:18-alpine
    container_name: kaiznbonsai_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kaiznbonsai_db}
      POSTGRES_USER: ${POSTGRES_USER:-kaiznbonsai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kaiznbonsai_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-kaiznbonsai_db}
      - POSTGRES_USER=${POSTGRES_USER:-kaiznbonsai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kaiznbonsai_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
